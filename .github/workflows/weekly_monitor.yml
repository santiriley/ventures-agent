name: Weekly Monitor

on:
  schedule:
    # Every Monday 13:00 UTC = 07:00 Costa Rica (UTC-6)
    - cron: "0 13 * * 1"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: read
  issues: write

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly monitor
        continue-on-error: false
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_LEADS: ${{ secrets.NOTION_DB_LEADS }}
          NOTION_DB_EVENTS: ${{ secrets.NOTION_DB_EVENTS }}
          NOTION_DB_DISRUPTION: ${{ secrets.NOTION_DB_DISRUPTION }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NOTIFY_EMAIL_ENABLED: ${{ secrets.NOTIFY_EMAIL_ENABLED }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scout.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scout-logs-${{ github.run_id }}
          path: |
            scout.log
            .tmp/failed_leads_*.txt
          retention-days: 14

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Carica Scout weekly run failed — ${date}`,
              body: [
                '## Weekly monitor run failed',
                '',
                `**Date:** ${date}`,
                `**Run:** ${runUrl}`,
                '',
                'Check the Actions logs and any uploaded artifacts for details.',
              ].join('\n'),
            });
